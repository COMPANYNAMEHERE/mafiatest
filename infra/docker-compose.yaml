version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: empire
      POSTGRES_PASSWORD: empire
      POSTGRES_DB: empire
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:7
  api:
    build: ../apps/api
    environment:
      DATABASE_URL: postgres://empire:empire@db/empire
      REDIS_URL: redis://redis
    depends_on:
      - db
      - redis
  web:
    build: ../apps/web
    depends_on:
      - api
    environment:
      VITE_API_URL: http://api:3000
  worker:
    build: ../packages/worker
    environment:
      DATABASE_URL: postgres://empire:empire@db/empire
      REDIS_URL: redis://redis
    depends_on:
      - db
      - redis
volumes:
  db-data:
